ai_usage_summary: |
  Used Gemini for architecture discussion and code scaffolding.
  All scoring logic, weights, and candidate evaluation rules were
  designed based on careful analysis of the JD and dataset.
  No candidate data was fed to any LLM during ranking.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  5-layer rule-based scoring engine with explicit reasoning capture.
  Layer 1+2 (40%): Career fit — title relevance, experience band,
  industry quality (product vs consulting), production ML evidence from
  career descriptions. Layer 3 (30%): Skills intelligence with anti-
  keyword-stuffing detection cross-referencing endorsements, duration,
  and career descriptions. Layer 4 (20%): Behavioral signal multiplier
  covering engagement, availability, GitHub activity, and salary fit.
  Layer 5: Honeypot detection catching impossible profiles via date
  contradictions and zero-evidence expert claims. Education bonus (10%).
  Runtime ~115 seconds for 100K candidates on CPU. No external APIs,
  no GPU, no network during ranking.

